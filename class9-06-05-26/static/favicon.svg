<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#667eea"/>
  
  <!-- Book -->
  <rect x="30" y="35" width="40" height="35" rx="3" fill="#fff" stroke="#764ba2" stroke-width="2"/>
  
  <!-- Book pages -->
  <line x1="50" y1="35" x2="50" y2="70" stroke="#764ba2" stroke-width="1.5"/>
  
  <!-- Lines on left page -->
  <line x1="35" y1="42" x2="48" y2="42" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="35" y1="48" x2="48" y2="48" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="35" y1="54" x2="48" y2="54" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="35" y1="60" x2="48" y2="60" stroke="#d0d0d0" stroke-width="1"/>
  
  <!-- Lines on right page -->
  <line x1="52" y1="42" x2="65" y2="42" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="52" y1="48" x2="65" y2="48" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="52" y1="54" x2="65" y2="54" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="52" y1="60" x2="65" y2="60" stroke="#d0d0d0" stroke-width="1"/>
  
  <!-- Star on book -->
  <g transform="translate(50, 48)">
    <polygon points="0,-8 2.4,-2.4 8,-0.8 3.2,3.2 4.8,9.2 0,5.6 -4.8,9.2 -3.2,3.2 -8,-0.8 -2.4,-2.4" fill="#f5a623"/>
  </g>
</svg>
